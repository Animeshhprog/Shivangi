<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mahila Mitra 💖 Shivangi</title>
<style>
/* Body & Background */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: #333;
    background: #ffc0cb; /* Baby Pink */
    overflow-x: hidden;
}

/* Header */
header {
    padding: 60px 20px;
    color: white;
}
header h1 {
    font-size: 3em;
}

/* Surprise Button */
button {
    padding: 12px 25px;
    border: none;
    background: white;
    color: #ff4d6d;
    font-size: 16px;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: #ff4d6d;
    color: white;
    transform: scale(1.05);
}

/* Sections */
.section {
    padding: 40px 20px;
}

/* Cards */
.card {
    display: inline-block;
    background: white;
    padding: 20px;
    margin: 10px;
    border-radius: 15px;
    width: 200px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 12px;
    color: #ff4d6d;
    animation: float 5s linear infinite;
}
@keyframes float {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-600px) scale(1.5); opacity: 0; }
}

/* Footer */
footer {
    padding: 20px;
    background: #ff4d6d;
    color: white;
}

/* Surprise Message */
#surprise-msg {
    display: none;
    font-size: 20px;
    margin-top: 20px;
    color: #ff4d6d;
}

/* Question Box */
#question-box {
    padding: 15px;
    border: 2px dashed #ff4d6d;
    border-radius: 10px;
    display: inline-block;
    background: rgba(255,192,203,0.2);
    font-size: 18px;
    margin-top: 15px;
}

/* Lucknow Question */
#lucknow-question {
    font-size: 20px;
    margin-bottom: 15px;
}
#lucknow-question button {
    margin: 5px;
}
#answer-display {
    margin-top:10px;
    color:#ff4d6d;
    font-size:18px;
}
</style>
</head>
<body>

<!-- Hearts -->
<script>
window.onload = function() {
    function createHeart() {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerText = '💖';
        heart.style.left = Math.random() * window.innerWidth + 'px';
        heart.style.fontSize = (10 + Math.random() * 10) + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
    setInterval(createHeart, 300);
}
</script>

<header>
    <h1 id="typed-header"></h1>
    <button onclick="showSurprise()">Click for a Surprise 😏</button>
    <p id="surprise-msg"></p>
</header>

<!-- Typing Effect -->
<script>
const text = "Dedicated to the most amazing woman I know, Shivangi 😉";
let i = 0;
function typeText() {
    if(i < text.length){
        document.getElementById("typed-header").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 100);
    }
}
typeText();
</script>

<!-- Surprise Button -->
<script>
function showSurprise() {
    const messages = [
        "Shivangi, you’re amazing 😌",
        "I knew it, you’re special 😏",
        "Keep smiling, Shivangi 💖"
    ];
    const random = messages[Math.floor(Math.random() * messages.length)];
    const p = document.getElementById("surprise-msg");
    p.innerText = random;
    p.style.display = "block";
}
</script>

<!-- About Section -->
<div class="section" id="about">
    <h2>ABOUT</h2>
    <p><!-- Add your text here later --></p>
</div>

<!-- Qualities Cards -->
<div class="section">
    <h2>Her Qualities 🌸</h2>
    <div class="card">🌸 Beautiful</div>
    <div class="card">🧠 Intelligent</div>
    <div class="card">😂 Funny</div>
    <div class="card">💪 Strong</div>
</div>

<!-- Audio -->
<div class="section">
    <h2>Enjoy the Song 🎶</h2>
    <audio controls>
        <source src="nazm-nazm.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
</div>

<!-- Question Time Section -->
<div class="section">
    <h2>Question Time 😄</h2>
    <p id="question-box"></p>
</div>

<script>
const questions = [
    "Shivangi, what's your favorite emoji? 😏",
    "If you could have a superpower, what would it be? 💫",
    "What's one thing that always makes you smile? 😊",
    "Cake or chocolate? 🍰🍫",
    "Would you rather travel to the beach or mountains? 🏖️🏔️",
    "What's your favorite song right now? 🎶"
];

let qIndex = 0;
function showNextQuestion() {
    const box = document.getElementById("question-box");
    box.innerText = questions[qIndex];
    qIndex = (qIndex + 1) % questions.length;
}
showNextQuestion();
setInterval(showNextQuestion, 45000);
</script>

<!-- Lucknow Yes/No Question -->
<div class="section">
    <h2>Special Question 😆</h2>
    <p id="lucknow-question">1-3 Baje Savere Lucknow Chalegi kya??</p>
    <button onclick="answerQuestion('Yes')">Yes ✅</button>
    <button onclick="answerQuestion('No')">No ❌</button>
    <p id="answer-display"></p>
</div>

<script>
function answerQuestion(answer){
    document.getElementById("answer-display").innerText = "Shivangi answered: " + answer;
    window.lucknowAnswer = answer; // store if needed
}
</script>

<footer>
    Made with ❤️ and a little courage, Shivangi 😄
</footer>

</body>
</html>
