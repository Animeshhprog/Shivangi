<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mahila Mitra 💖 Shivangi</title>
<style>
/* Body & Background */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: #333;
    background: #ffc0cb; /* Baby Pink */
    overflow-x: hidden;
}

/* Header */
header {
    padding: 60px 20px;
    color: white;
}
header h1 {
    font-size: 3em;
}

/* Surprise Button */
button {
    padding: 12px 25px;
    border: none;
    background: white;
    color: #ff4d6d;
    font-size: 16px;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: #ff4d6d;
    color: white;
}

/* Sections */
.section {
    padding: 40px 20px;
}

/* Cards */
.card {
    display: inline-block;
    background: white;
    padding: 20px;
    margin: 10px;
    border-radius: 15px;
    width: 200px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 12px;
    color: #ff4d6d;
    animation: float 5s linear infinite;
}
@keyframes float {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-600px) scale(1.5); opacity: 0; }
}

/* Footer */
footer {
    padding: 20px;
    background: #ff4d6d;
    color: white;
}

/* Surprise Message */
#surprise-msg {
    display: none;
    font-size: 20px;
    margin-top: 20px;
    color: #ff4d6d;
}
</style>
</head>
<body>

<!-- Hearts -->
<script>
function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerText = '💖';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.fontSize = (10 + Math.random() * 10) + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);
</script>

<header>
    <h1 id="typed-header"></h1>
    <button onclick="showSurprise()">Click for a Surprise 😏</button>
    <p id="surprise-msg"></p>
</header>

<!-- Typing Effect -->
<script>
const text = "Dedicated to the most amazing woman I know, Shivangi 😉";
let i = 0;
function typeText() {
    if(i < text.length){
        document.getElementById("typed-header").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 100);
    }
}
typeText();
</script>

<!-- Surprise Button -->
<script>
function showSurprise() {
    const messages = [
        "Shivangi, you’re amazing 😌",
        "I knew it, you’re special 😏",
        "Keep smiling, Shivangi 💖"
    ];
    const random = messages[Math.floor(Math.random() * messages.length)];
    const p = document.getElementById("surprise-msg");
    p.innerText = random;
    p.style.display = "block";
}
</script>

<div class="section" id="about">
    <h2>ABOUT</h2>
    <p> <!-- Add your text here later --> </p>
</div>

<div class="section">
    <h2>Her Qualities 🌸</h2>
    <div class="card">🌸 Beautiful</div>
    <div class="card">🧠 Intelligent</div>
    <div class="card">😂 Funny</div>
    <div class="card">💪 Strong</div>
</div>

<!-- Audio -->
<div class="section">
    <h2>Enjoy the Song 🎶</h2>
    <audio controls>
        <source src="nazm-nazm.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
</div>

<footer>
    Made with ❤️ and a little courage, Shivangi 😄
</footer>

</body>
</html>
